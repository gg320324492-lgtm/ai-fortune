name: Deploy to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          npm ci
          npm run build
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - run: |
          TARGET_HOST=60.205.93.8
          TARGET_USER=admin
          TARGET_PORT=22
          REMOTE_DIR=/var/www/fate
          mkdir -p ~/.ssh
          ssh-keyscan -p $TARGET_PORT $TARGET_HOST >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASSWORD" ssh -p $TARGET_PORT -o StrictHostKeyChecking=no $TARGET_USER@$TARGET_HOST "mkdir -p '$REMOTE_DIR'"
          sshpass -p "$SSH_PASSWORD" rsync -az --delete -e "ssh -p $TARGET_PORT -o StrictHostKeyChecking=no" out/ "$TARGET_USER@$TARGET_HOST:$REMOTE_DIR/"
          sshpass -p "$SSH_PASSWORD" ssh -p $TARGET_PORT -o StrictHostKeyChecking=no $TARGET_USER@$TARGET_HOST "sudo nginx -t && sudo systemctl reload nginx"
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
